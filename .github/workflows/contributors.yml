name: contributor automation

on:
  schedule:
    - cron: '0 0 * * *'
  pull_request_target:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    if: |
      github.event_name == 'schedule' || 
      (github.event_name == 'pull_request_target' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch Merged PR Authors
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PAGE=1
          echo "[]" > final_list.json
          while true; do
            RESPONSE=$(gh api "/repos/${{ github.repository }}/pulls?state=closed&per_page=100&page=${PAGE}")
            COUNT=$(echo "$RESPONSE" | jq '. | length')
            if [ "$COUNT" -eq 0 ]; then break; fi
            jq -s '.[0] + .[1]' final_list.json <(echo "$RESPONSE") > tmp.json && mv tmp.json final_list.json
            PAGE=$((PAGE + 1))
          done
          jq '[.[] 
            | select(.merged_at != null and .user != null and .user.type != "Bot") 
            | .user.login] 
            | unique 
            | sort' final_list.json > contributors.json

      - name: Build Gallery HTML
        shell: bash
        run: |
          set -euo pipefail
          echo '<div align="center">' > gallery_fragment.txt
          jq -r '.[]' contributors.json > usernames.txt
          while read -r USERNAME; do
            if [ -n "$USERNAME" ]; then
              echo "<a href=\"https://github.com/${USERNAME}\" style=\"display:inline-block;text-decoration:none;color:inherit;margin:10px;\">" >> gallery_fragment.txt
              echo "  <img src=\"https://github.com/${USERNAME}.png\" width=\"80\" height=\"80\" loading=\"lazy\" title=\"${USERNAME}\" style=\"border-radius:50%;object-fit:cover;border:3px solid #2ecc71;\" alt=\"${USERNAME}\" />" >> gallery_fragment.txt
              echo "  <div style=\"font-size:12px;margin-top:8px;font-weight:bold;\">@${USERNAME}</div>" >> gallery_fragment.txt
              echo "</a>" >> gallery_fragment.txt
            fi
          done < usernames.txt
          echo '</div>' >> gallery_fragment.txt

      - name: Update README.md
        run: |
          set -euo pipefail
          # Remove previous content between markers
          sed -i '/<!-- CONTRIBUTORS_START -->/,/<!-- CONTRIBUTORS_END -->/ {
            /<!-- CONTRIBUTORS_START -->/! { /<!-- CONTRIBUTORS_END -->/! d; }
          }' README.md
          # Insert new content after start marker
          sed -i '/<!-- CONTRIBUTORS_START -->/r gallery_fragment.txt' README.md
 
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to README."
          else
            git commit -m "docs: update contributor gallery and unify workflows"
            git push
          fi
